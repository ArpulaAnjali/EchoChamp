<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #a8e6c1 0%, #56ab91 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .register-container {
            width: 100%;
            max-width: 450px;
        }
        .register-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        .register-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .register-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #198754;
            margin-bottom: 10px;
        }
        .register-header p {
            color: #666;
            font-size: 1rem;
        }
        .form-control {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            padding: 12px 16px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #198754;
            box-shadow: 0 0 0 0.2rem rgba(25, 135, 84, 0.25);
        }
        .form-control::placeholder {
            color: #999;
        }
        .register-btn {
            background: linear-gradient(135deg, #198754 0%, #0d6d3a 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(25, 135, 84, 0.4);
        }
        .register-footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
        }
        .register-footer a {
            color: #198754;
            text-decoration: none;
            font-weight: 600;
        }
        .register-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="register-container">
    <div class="register-header">
        <h1>🌱 EcoChamp</h1>
        <p>Join the Environmental Revolution</p>
    </div>

    <div class="card register-card p-5">
        <h2 class="text-center mb-4" style="color: #198754; font-weight: 600;">Create Account</h2>

        <form id="registerForm">
            <div class="mb-3">
                <input
                    type="text"
                    class="form-control"
                    id="name"
                    placeholder="Enter your full name"
                    required>
            </div>

            <div class="mb-3">
                <input
                    type="email"
                    class="form-control"
                    id="email"
                    placeholder="Enter your email"
                    required>
            </div>

            <div class="mb-4">
                <input
                    type="password"
                    class="form-control"
                    id="password"
                    placeholder="Create a password"
                    required>
            </div>

            <button type="submit" class="btn btn-success register-btn w-100">
                Register
            </button>
        </form>

        <div class="register-footer">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>
</div>

<script src="../js/auth.js"></script>

</body>
</html>
