function getQueryParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
}

function renderTopic(topic) {
    document.getElementById('topicTitle').innerText = topic.title;
    document.getElementById('topicModule').innerText = `Module: ${topic.module}`;
    const contentHtml = topic.content.map(paragraph => `<p>${paragraph}</p>`).join('');
    document.getElementById('topicContent').innerHTML = contentHtml;
}

function renderTopicNavigation(currentId) {
    const index = topics.findIndex(topic => topic.id === currentId);
    const prevBtn = document.getElementById('prevTopic');
    const nextBtn = document.getElementById('nextTopic');
    const position = document.getElementById('topicPosition');

    if (index > 0) {
        prevBtn.classList.remove('d-none');
        prevBtn.href = `topic.html?id=${topics[index - 1].id}`;
    } else {
        prevBtn.classList.add('d-none');
    }

    if (index < topics.length - 1) {
        nextBtn.classList.remove('d-none');
        nextBtn.href = `topic.html?id=${topics[index + 1].id}`;
    } else {
        nextBtn.classList.add('d-none');
    }

    position.innerText = `Topic ${index + 1} of ${topics.length}`;
}

const topicId = getQueryParam('id');
const topic = topics.find(item => item.id === topicId);
if (topic) {
    renderTopic(topic);
    renderTopicNavigation(topicId);
} else {
    document.getElementById('topicTitle').innerText = 'Topic Not Found';
    document.getElementById('topicContent').innerHTML = '<p>Please choose a topic from the <a href="lessons.html">Modules page</a>.</p>';
    document.getElementById('topicModule').innerText = '';
    document.getElementById('topicPosition').innerText = '';
}
</script>
<div id="sharedFooter"></div>
<script src="../js/layout.js"></script>
</body>
</html>
