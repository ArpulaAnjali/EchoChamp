<!DOCTYPE html>
<html>
<head>
<title>Quiz</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    * {
        box-sizing: border-box;
    }
    
    html {
        min-height: 100%;
    }
    
    body {
        background: #f5fff5;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
    }
    
    .container-fluid {
        flex: 1;
        padding: 0;
        margin: 0;
        width: 100%;
        overflow-x: hidden;
    }
    
    .container-fluid .row {
        margin: 0;
        width: 100%;
    }
    
    .col-md-10 {
        padding: 1.5rem;
        overflow-x: hidden;
    }
    
    .col-md-2 {
        padding: 0;
    }
    
    .sidebar {
        min-height: 100vh;
        background: #198754;
        padding: 0;
    }
    .sidebar a {
        color: white;
        text-decoration: none;
        display: block;
        padding: 15px;
    }
    .sidebar a:hover {
        background: #146c43;
    }
    
    /* Reward Notifications */
    .reward-notification {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.8);
        background: white;
        border-radius: 20px;
        padding: 2rem;
        box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
        z-index: 10000;
        text-align: center;
        animation: slideUp 0.3s ease-out forwards;
        min-width: 300px;
        border: 3px solid #FFD700;
    }
    
    .reward-notification.show {
        animation: slideUp 0.3s ease-out forwards;
    }
    
    .reward-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
    }
    
    .reward-notification h3 {
        color: #198754;
        margin: 0;
        font-weight: bold;
    }
    
    .reward-notification h4 {
        color: #146c43;
        margin: 0;
        font-size: 1.5rem;
    }
    
    .reward-notification p {
        color: #666;
        margin: 0;
        font-size: 0.9rem;
    }
    
    /* Achievement Notifications */
    .achievement-notification {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: linear-gradient(135deg, #198754 0%, #146c43 100%);
        border-radius: 15px;
        padding: 1.5rem;
        color: white;
        box-shadow: 0 5px 30px rgba(0, 0, 0, 0.2);
        z-index: 9999;
        animation: slideIn 0.3s ease-out forwards;
        min-width: 250px;
    }
    
    .achievement-notification.show {
        animation: slideIn 0.3s ease-out forwards;
    }
    
    .achievement-content {
        display: flex;
        align-items: center;
        gap: 1rem;
    }
    
    .achievement-icon {
        font-size: 2.5rem;
        flex-shrink: 0;
    }
    
    .achievement-notification h4 {
        color: white;
        margin: 0 0 0.5rem 0;
        font-size: 1.1rem;
    }
    
    .achievement-notification p {
        color: #e8f5e9;
        margin: 0;
        font-size: 0.85rem;
    }
    
    @keyframes slideUp {
        0% {
            opacity: 0;
            transform: translate(-50%, 0) scale(0.8);
        }
        100% {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
    }
    
    @keyframes slideIn {
        0% {
            opacity: 0;
            transform: translateX(400px);
        }
        100% {
            opacity: 1;
            transform: translateX(0);
        }
    }
</style>
</head>
<body>

<div id="sharedHeader"></div>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <a href="index.html">
                <i class="fas fa-home"></i> Home
            </a>
            <a href="dashboard.html">
                <i class="fas fa-home"></i> Dashboard
            </a>
            <a href="lessons.html">
                <i class="fas fa-book"></i> Modules
            </a>
            <a href="quiz.html">
                <i class="fas fa-question-circle"></i> Quiz
            </a>
            <a href="challenges.html">
                <i class="fas fa-bullseye"></i> Challenges
            </a>
            <a href="leaderboard.html">
                <i class="fas fa-trophy"></i> Leaderboard
            </a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">

            <h2>EcoQuiz</h2>

            <!-- Level Selection View -->
            <div id="levelSelectionView">
                <p class="text-muted mb-4">Select a quiz level to get started</p>
                <div id="levelCardsContainer" class="row g-3"></div>
            </div>

            <!-- Quiz View -->
            <div id="quizView" class="d-none">
                <button id="backBtn" class="btn btn-outline-secondary mb-3">← Back to Levels</button>
                
                <div id="levelHeader" class="mb-3">
                    <h4 id="levelTitle"></h4>
                    <div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-3">
                        <div><strong>Question:</strong> <span id="questionNumber">1</span>/<span id="questionTotal">1</span></div>
                        <div><strong>Time Left:</strong> <span id="timer">30</span>s</div>
                    </div>
                </div>

                <div class="card shadow mb-4 p-4">
                    <h5 id="questionText">Loading question...</h5>
                    <div id="optionsContainer" class="mt-3"></div>
                </div>

                <div class="d-flex flex-wrap gap-2 mb-3">
                    <button id="submitBtn" class="btn btn-success">Submit Answer</button>
                    <button id="nextBtn" class="btn btn-secondary" disabled>Next Question</button>
                </div>

                <div class="card shadow p-3 mb-4">
                    <div class="row text-center">
                        <div class="col-md-4 mb-2"><strong>Score:</strong> <span id="score">0</span></div>
                        <div class="col-md-4 mb-2"><strong>Eco Points:</strong> <span id="coins">0</span></div>
                        <div class="col-md-4 mb-2"><strong>Badge:</strong> <span id="badge">None</span></div>
                    </div>
                </div>

                <div id="feedback" class="alert d-none" role="alert"></div>

                <div id="completion" class="card shadow p-4 d-none">
                    <h4>Level Complete! 🎉</h4>
                    <p><strong>Final Score:</strong> <span id="finalScore"></span></p>
                    <p><strong>Total Eco Points:</strong> <span id="finalCoins"></span></p>
                    <p><strong>Badge Earned:</strong> <span id="finalBadge"></span></p>
                    <button id="continueBtn" class="btn btn-success">Back to Levels</button>
                </div>
            </div>

        </div>
    </div>
</div>

<div id="sharedFooter"></div>
<script src="../js/layout.js"></script>
<script src="../js/rewards.js"></script>
<script src="../js/quiz.js"></script>

</body>
</html>
