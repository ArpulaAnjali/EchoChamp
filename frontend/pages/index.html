<!DOCTYPE html>
<html>
<head>
    <title>EcoChamp</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/style.css">
    
    <style>
        * {
            box-sizing: border-box;
        }
        
        html {
            min-height: 100%;
        }
        
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        main {
            flex: 1;
        }
        
        .hero {
            padding: 100px 0;
            background: #d4edda;
            width: 100%;
            box-sizing: border-box;
        }
        
        .hero .container {
            max-width: 100%;
            padding: 0 1.5rem;
        }
        
        section.container {
            max-width: 100%;
            padding: 0 1.5rem;
            margin: 2rem auto !important;
        }
    </style>
</head>
<body>

<div id="sharedHeader"></div>
<main>
    <section class="hero text-center">
        <div class="container">
            <h1>Welcome to EcoChamp</h1>

            <p>
                Learn, Act and Protect the Environment Through Gamified Learning
            </p>

            <a href="register.html" class="btn btn-success btn-lg">
                Get Started
            </a>
        </div>
    </section>

    <section class="container mt-5">
        <div class="row">

            <div class="col-md-4">
                <div class="card p-3 shadow">
                    <h3>Learn</h3>
                    <p>Interactive environmental lessons.</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3 shadow">
                    <h3>Challenge</h3>
                    <p>Participate in eco-friendly activities.</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3 shadow">
                    <h3>Compete</h3>
                    <p>Earn badges and climb the leaderboard.</p>
                </div>
            </div>

        </div>
    </section>
</main>

<div id="sharedFooter"></div>
<script src="../js/layout.js"></script>
</body>
</html>
