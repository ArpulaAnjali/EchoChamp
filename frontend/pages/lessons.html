<!DOCTYPE html>
<html>
<head>
<title>Lessons</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    * {
        box-sizing: border-box;
    }
    
    html {
        min-height: 100%;
    }
    
    body {
        background: #f5fff5;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
    }
    
    .container-fluid {
        flex: 1;
        padding: 0;
        margin: 0;
        width: 100%;
        overflow-x: hidden;
    }
    
    .container-fluid .row {
        margin: 0;
        width: 100%;
    }
    
    .col-md-10 {
        padding: 1.5rem;
        overflow-x: hidden;
    }
    
    .col-md-2 {
        padding: 0;
    }
    
    .sidebar {
        min-height: 100vh;
        background: #198754;
        padding: 0;
    }
    .sidebar a {
        color: white;
        text-decoration: none;
        display: block;
        padding: 15px;
    }
    .sidebar a:hover {
        background: #146c43;
    }
</style>
</head>
<body>

<div id="sharedHeader"></div>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <a href="index.html">
                <i class="fas fa-home"></i> Home
            </a>
            <a href="dashboard.html">
                <i class="fas fa-home"></i> Dashboard
            </a>
            <a href="lessons.html">
                <i class="fas fa-book"></i> Modules
            </a>
            <a href="quiz.html">
                <i class="fas fa-question-circle"></i> Quiz
            </a>
            <a href="challenges.html">
                <i class="fas fa-bullseye"></i> Challenges
            </a>
            <a href="leaderboard.html">
                <i class="fas fa-trophy"></i> Leaderboard
            </a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">

            <h2>Environmental Topics</h2>
            <p class="text-muted">Explore 20 individual environmental topics with detailed information for each.</p>

            <div id="lessonContainer" class="row mt-4"></div>

        </div>
    </div>
</div>

<script>

const topics = [
    { id: "climate-causes", title: "Causes of Climate Change", module: "Climate Change", description: "Learn what drives climate change and the role of greenhouse gases." },
    { id: "climate-effects", title: "Effects on Weather and Sea Levels", module: "Climate Change", description: "Discover how changing climate alters storms, rainfall, and ocean levels." },
    { id: "greenhouse-gases", title: "Greenhouse Gases and Emissions", module: "Climate Change", description: "Understand the key emissions that trap heat and warm the planet." },
    { id: "climate-action", title: "Climate Action and Individual Change", module: "Climate Change", description: "See how individual actions help fight climate change." },
    { id: "plastic-reduction", title: "Reducing Single-Use Plastics", module: "Waste Management", description: "Find smart ways to cut down single-use plastic waste." },
    { id: "recycling-right", title: "Recycling Right", module: "Waste Management", description: "Learn how to recycle correctly and keep materials out of landfills." },
    { id: "composting", title: "Composting Basics", module: "Waste Management", description: "Turn organic waste into nutrient-rich compost for gardens." },
    { id: "e-waste", title: "Electronic Waste Disposal", module: "Waste Management", description: "Dispose of old electronics safely and recycle valuable parts." },
    { id: "water-home", title: "Saving Water at Home", module: "Water Conservation", description: "Use simple habits to reduce water use in your household." },
    { id: "protect-rivers", title: "Protecting Rivers and Lakes", module: "Water Conservation", description: "Keep waterways clean and protect freshwater ecosystems." },
    { id: "water-gardens", title: "Water-Smart Garden Care", module: "Water Conservation", description: "Use water-efficient gardening techniques to save resources." },
    { id: "clean-water", title: "Clean Drinking Water Access", module: "Water Conservation", description: "Explore why clean water access matters for people and nature." },
    { id: "solar-home", title: "Solar Power at Home", module: "Renewable Energy", description: "Learn how solar energy can power your home sustainably." },
    { id: "wind-energy", title: "Wind Energy for Communities", module: "Renewable Energy", description: "Discover the benefits of wind power for communities." },
    { id: "hydropower", title: "Hydropower and Small Dams", module: "Renewable Energy", description: "Understand how water can generate renewable electricity." },
    { id: "bioenergy", title: "Bioenergy and Sustainable Fuels", module: "Renewable Energy", description: "Explore energy from organic materials and sustainable fuels." },
    { id: "habitat-protection", title: "Habitat Protection", module: "Biodiversity & Sustainable Living", description: "Learn how protecting habitats supports wildlife and ecosystems." },
    { id: "urban-green", title: "Urban Green Spaces", module: "Biodiversity & Sustainable Living", description: "See why green spaces are essential for cities and biodiversity." },
    { id: "eco-transport", title: "Eco-Friendly Transportation", module: "Biodiversity & Sustainable Living", description: "Choose sustainable transport to reduce pollution and protect nature." },
    { id: "energy-efficiency", title: "Energy Efficiency in Buildings", module: "Biodiversity & Sustainable Living", description: "Save energy with efficient buildings and appliances." }
];

let output = "";

topics.forEach(topic => {
    output += `
        <div class="col-md-4">
            <div class="card p-3 mb-3 h-100">
                <h4>${topic.title}</h4>
                <p class="text-muted">${topic.module}</p>
                <p>${topic.description}</p>
                <a href="topic.html?id=${topic.id}" class="btn btn-success">View Topic</a>
            </div>
        </div>
    `;
});

document.getElementById("lessonContainer").innerHTML = output;

</script>
<div id="sharedFooter"></div>
<script src="../js/layout.js"></script>

</body>
</html>
