<!DOCTYPE html>
<html>
<head>
<title>Submit Activity</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/layout.css">
<style>
    * {
        box-sizing: border-box;
    }
    
    html {
        min-height: 100%;
    }
    
    body {
        background: #f5fff5;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
    }
    
    main {
        flex: 1;
        padding: 2rem 0;
    }
    
    .container {
        max-width: 600px;
        padding: 0 1.5rem;
    }
    
    /* Reward Notifications */
    .reward-notification {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.8);
        background: white;
        border-radius: 20px;
        padding: 2rem;
        box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
        z-index: 10000;
        text-align: center;
        animation: slideUp 0.3s ease-out forwards;
        min-width: 300px;
        border: 3px solid #FFD700;
    }
    
    .achievement-notification {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: linear-gradient(135deg, #198754 0%, #146c43 100%);
        border-radius: 15px;
        padding: 1.5rem;
        color: white;
        box-shadow: 0 5px 30px rgba(0, 0, 0, 0.2);
        z-index: 9999;
        animation: slideIn 0.3s ease-out forwards;
        min-width: 250px;
    }
    
    @keyframes slideUp {
        0% {
            opacity: 0;
            transform: translate(-50%, 0) scale(0.8);
        }
        100% {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
    }
    
    @keyframes slideIn {
        0% {
            opacity: 0;
            transform: translateX(400px);
        }
        100% {
            opacity: 1;
            transform: translateX(0);
        }
    }

</style>
</head>
<body>

<div id="sharedHeader"></div>
<main>
    <div class="container mt-5">
        <h2>Submit Activity</h2>

        <form id="activityForm">

            <input
                type="text"
                class="form-control mb-3"
                placeholder="Activity Description"
                id="description">

            <input
                type="file"
                class="form-control mb-3"
                id="image">

            <button class="btn btn-success">
                Submit Activity
            </button>

        </form>
    </div>
</main>

<div id="sharedFooter"></div>
<script src="../js/layout.js"></script>
<script src="../js/rewards.js"></script>
<script>

document.getElementById("activityForm")
    .addEventListener("submit", async(e) => {

        e.preventDefault();

        const formData = new FormData();

        formData.append(
            "description",
            document.getElementById("description").value
        );

        formData.append(
            "image",
            document.getElementById("image").files[0]
        );

        await fetch(
            "http://localhost:5000/api/activity/upload",
            {
                method: "POST",
                body: formData
            }
        );

        // Award points for activity submission
        const totalPoints = addEcoPoints(25, 'activity');
        
        // Show success notification
        const notification = document.createElement('div');
        notification.className = 'achievement-notification';
        notification.style.animation = 'slideIn 0.3s ease-out forwards';
        notification.innerHTML = `
            <div style="display: flex; align-items: center; gap: 1rem;">
                <span style="font-size: 2rem;">✅</span>
                <div>
                    <h6 style="color: white; margin: 0 0 0.5rem 0;">Activity Submitted!</h6>
                    <p style="color: #e8f5e9; margin: 0; font-size: 0.85rem;">+25 Eco Points earned!</p>
                </div>
            </div>
        `;
        
        document.body.appendChild(notification);
        
        setTimeout(() => {
            notification.remove();
        }, 3000);
        
        // Reset form
        document.getElementById("activityForm").reset();
        alert("Activity uploaded successfully! You earned 25 Eco Points.");

    });

</script>

</body>
</html>
